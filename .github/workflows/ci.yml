name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package (.vsix) dry-run
        run: npx --yes @vscode/vsce package --no-git-tag-version --out sema.vsix
